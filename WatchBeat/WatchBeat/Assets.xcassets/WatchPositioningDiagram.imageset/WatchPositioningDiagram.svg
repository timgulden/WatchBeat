<svg width="100%" viewBox="0 220 308 152" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Watch placement on iPhone for accelerometer timing</title>
<desc>Cropped top-down view: bottom of iPhone with watch on edge against the bottom edge.</desc>

<style>
  .th { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; font-weight: 600; fill: #222; }
  .ts { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 10px; font-weight: 400; fill: #555; }
</style>

<!-- iPhone body -->
<rect x="120" y="40" width="140" height="280" rx="22" fill="#f4f4f4" stroke="#444" stroke-width="1"/>

<!-- iPhone screen inset -->
<rect x="128" y="50" width="124" height="252" rx="14" fill="#fafafa" stroke="#888" stroke-width="0.8"/>

<!-- X-ray view of bottom-edge components -->
<rect x="148" y="316" width="28" height="4" rx="1" fill="none" stroke="#D4A85F" stroke-width="1.2"/>
<rect x="183" y="316" width="14" height="4" rx="1" fill="#444"/>
<rect x="204" y="316" width="28" height="4" rx="1" fill="#aaa"/>

<!-- Watch case body with beveled top edge -->
<path d="M 122 322 L 138 320 L 186 320 L 202 322 L 202 340 L 122 340 Z"
      fill="#f4f4f4"
      stroke="#444"
      stroke-width="1"/>

<!-- Caseback edge highlighted -->
<polyline points="122,322 138,320 186,320 202,322"
          fill="none"
          stroke="#D4A85F"
          stroke-width="3"
          stroke-linejoin="round"/>

<!-- Domed crystal -->
<path d="M 126 340 Q 128 344 132 344 L 192 344 Q 196 344 198 340"
      fill="#fafafa"
      stroke="#444"
      stroke-width="1"/>

<!-- Crown -->
<rect x="114" y="325" width="8" height="10" rx="1.5" fill="#D4A85F" stroke="#A07A2E" stroke-width="0.5"/>
<line x1="115" y1="328" x2="121" y2="328" stroke="#A07A2E" stroke-width="0.5"/>
<line x1="115" y1="330" x2="121" y2="330" stroke="#A07A2E" stroke-width="0.5"/>
<line x1="115" y1="332" x2="121" y2="332" stroke="#A07A2E" stroke-width="0.5"/>

<!-- Leader lines -->
<g fill="none" stroke="#666" stroke-width="0.8" stroke-dasharray="3,2">
  <path d="M 135 320 L 98 270" />
  <path d="M 114 330 L 98 320" />
  <path d="M 160 344 L 98 356" />
  <path d="M 176 318 L 216 338" />
</g>

<!-- Caseback label -->
<text class="th" x="96" y="252" text-anchor="end" dominant-baseline="central">Caseback</text>
<text class="ts" x="96" y="264" text-anchor="end" dominant-baseline="central">against phone</text>
<text class="ts" x="96" y="276" text-anchor="end" dominant-baseline="central">bottom edge</text>

<!-- Crown label -->
<text class="th" x="96" y="316" text-anchor="end" dominant-baseline="central">Crown</text>
<text class="ts" x="96" y="328" text-anchor="end" dominant-baseline="central">Pointing left</text>

<!-- Watch crystal label -->
<text class="th" x="96" y="356" text-anchor="end" dominant-baseline="central">Crystal</text>

<!-- Microphone label -->
<text class="th" x="218" y="338" text-anchor="start" dominant-baseline="central">iPhone Mic</text>
<text class="ts" x="218" y="350" text-anchor="start" dominant-baseline="central">faces down</text>
<text class="ts" x="218" y="362" text-anchor="start" dominant-baseline="central">contacts caseback</text>

</svg>
